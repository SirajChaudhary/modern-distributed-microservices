# Gateway runs on port 8080 and acts as the single entry point
server:
  port: 8080

spring:
  application:
    # Service name registered in Eureka
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    # Allow 1 requests/sec
                    redis-rate-limiter.replenishRate: 1
                    # Allow short burst of 2 requests
                    # Maximum number of requests that can be handled immediately during a traffic spike
                    redis-rate-limiter.burstCapacity: 2
                    # userKeyResolver bean is defined in RateLimiterConfig class
                    key-resolver: "#{@userKeyResolver}"

            - id: course-service
              uri: lb://COURSE-SERVICE
              predicates:
                - Path=/api/v1/courses/**
              filters:
                - name: RequestRateLimiter
                  args:
                    # Allow 5 requests/sec
                    redis-rate-limiter.replenishRate: 5
                    # Allow short burst of 10 requests
                    redis-rate-limiter.burstCapacity: 10
                    # userKeyResolver bean is defined in RateLimiterConfig class
                    key-resolver: "#{@userKeyResolver}"

            - id: enrollment-service
              uri: lb://ENROLLMENT-SERVICE
              predicates:
                - Path=/api/v1/enrollments/**
              filters:
                - name: RequestRateLimiter
                  args:
                    # Allow 5 requests/sec
                    redis-rate-limiter.replenishRate: 5
                    # Allow short burst of 10 requests
                    redis-rate-limiter.burstCapacity: 10
                    # userKeyResolver bean is defined in RateLimiterConfig class
                    key-resolver: "#{@userKeyResolver}"

            - id: certificate-service
              uri: lb://CERTIFICATE-SERVICE
              predicates:
                - Path=/api/v1/certificates/**
              filters:
                - name: RequestRateLimiter
                  args:
                    # Allow 5 requests/sec
                    redis-rate-limiter.replenishRate: 5
                    # Allow short burst of 10 requests
                    redis-rate-limiter.burstCapacity: 10
                    # userKeyResolver bean is defined in RateLimiterConfig class
                    key-resolver: "#{@userKeyResolver}"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/modern-distributed-microservices

  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      # Eureka Server URL
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        # Expose health and info actuator endpoints
        include: health,info,env

  tracing:
    sampling:
      # 1.0 means: Trace 100% of requests
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:

  # Enable detailed Gateway logs during development
  level:
    org.springframework.cloud.gateway: DEBUG

  # Include CorrelationId, TraceId and SpanId in application logs
  #
  # CorrelationId is generated by CorrelationIdFilter and
  # propagated across all downstream services.
  #
  # TraceId and SpanId are automatically generated by
  # OpenTelemetry through Micrometer Tracing.
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{X-Correlation-Id:-} traceId=%X{traceId:-} spanId=%X{spanId:-} %-5level %logger{36} - %msg%n"
server:
  port: 8085

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      # 1.0 means: Trace 100% of requests
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:

  # Include CorrelationId, TraceId and SpanId in application logs
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{X-Correlation-Id:-} traceId=%X{traceId:-} spanId=%X{spanId:-} %-5level %logger{36} - %msg%n"
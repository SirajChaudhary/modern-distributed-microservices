server:
  port: 8083

spring:
  application:
    name: enrollment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/enrollment_db
    username: postgres
    password: siraj123

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      # 1.0 means: Trace 100% of requests
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    # Include CorrelationId, TraceId and SpanId in application logs
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{X-Correlation-Id:-} traceId=%X{traceId:-} spanId=%X{spanId:-} %-5level %logger{36} - %msg%n"

# Fault tolerance with Circuit Breaker, Retry and Timeout using Resilience4j
resilience4j:

  retry:
    instances:

      userService:
        max-attempts: 3
        wait-duration: 1s

      courseService:
        max-attempts: 3
        wait-duration: 1s

  circuitbreaker:
    instances:

      userService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

      courseService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

  timelimiter:
    instances:

      userService:
        timeout-duration: 2s

      courseService:
        timeout-duration: 2s
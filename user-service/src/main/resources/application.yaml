# User Service Port
server:
  port: 8081

spring:
  application:
    # Service name registered in Eureka
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: siraj123

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      # Eureka Server URL
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      # 1.0 means: Trace 100% of requests
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    # Include CorrelationId, TraceId and SpanId in application logs
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{X-Correlation-Id:-} traceId=%X{traceId:-} spanId=%X{spanId:-} %-5level %logger{36} - %msg%n"
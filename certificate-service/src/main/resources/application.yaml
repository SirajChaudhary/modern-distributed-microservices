server:
  port: 8086

spring:
  application:
    name: certificate-service

  datasource:
    url: jdbc:postgresql://localhost:5432/certificate_db
    username: postgres
    password: siraj123

  jpa:
    hibernate:
      ddl-auto: none

  kafka:
    bootstrap-servers: localhost:29092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{X-Correlation-Id:-} traceId=%X{traceId:-} spanId=%X{spanId:-} %-5level %logger{36} - %msg%n"